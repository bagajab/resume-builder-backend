003e\u003c/div\u003e\u003cdiv style=\"padding:10.0px 0.0px;border:1.0px solid transparent\"\u003e\u003cdiv style=\"font-size:18.0px;word-wrap:break-word\"\u003e\u003ch2 style=\"font-size:1.0em;margin:0.0px\"\u003e\u003cb\u003eMain Functions\u003c/b\u003e\u003c/h2\u003e \u003c/div\u003e\u003cdiv\u003e\u003cul\u003e\n\u003cli\u003eProvide timely operational support\u003c/li\u003e\n\u003cli\u003eAssist in activity planning\u003c/li\u003e\n\u003cli\u003ePrepare operational work schedules and follow up implementation \u003c/li\u003e\n\u003cli\u003eCoordinate and/or Engage in technical assistance and/or logistical work\u003c/li\u003e\n\u003cli\u003eAssist in the creation, improvement and maintenance of operational processes  and systems\u003c/li\u003e\n\u003cli\u003ePrepare office communication and draft reports.\u003c/li\u003e\n\u003cli\u003eHandle communication at operational level and provide update\u003c/li\u003e\n\u003cli\u003eAssist in the compilation and maintenance of data and information for preparation, implementation and monitoring of budgets, activities etc..\u003c/li\u003e\n\u003c/ul\u003e\u003c/div\u003e\u003c/div\u003e\u003cdiv style=\"padding:10.0px 0.0px;border:1.0px solid transparent\"\u003e\u003cdiv style=\"font-size:18.0px;word-wrap:break-word\"\u003e\u003ch2 style=\"font-size:1.0em;margin:0.0px\"\u003e\u003cb\u003eSpecific Responsibilities\u003c/b\u003e\u003c/h2\u003e \u003c/div\u003e\u003cdiv\u003e\u003cul\u003e\n\u003cli\u003eAnalyse and maintain an overview of the Directorate’s work to ensure that timely administrative support is provided in general and specialized areas;\u003c/li\u003e\n\u003cli\u003eTake the lead in supporting the organization of meetings including coordination of invitations, confirmations, ticketing and accommodation for multiple participants for the Office of the Director and the directorate at large (as need be)\u003c/li\u003e\n\u003cli\u003eLiaise effectively with internal and external stakeholders on administrative ,matters of the department (this includes in relation to facilities (office space and equipment), security and protocol items (security/ID badges and passports) with assistance from other secretarial staff, Clerks and Mail Runners;\u003c/li\u003e\n\u003cli\u003eLiaise with AHRMD, Finance and anay other Department to provide first hand support in areas such as, but not limited to, Procurement and Travel Management; Leave Management, Performance Management, Contract Management, Budget Management; interpretation, translation and venue arrangement issues respectively\u003c/li\u003e\n\u003cli\u003eParticipate in the preparation, implementation and monitoring of budgets and liaise with the Finance on budgetary matters on behalf of the Directorate as required.\u003c/li\u003e\n\u003cli\u003eEnsure the timely sourcing and ordering stationery and office equipment for the department.\u003c/li\u003e\n\u003cli\u003eBe responsible for compilation of information on staff official missions, various official trips and leave schedules for better information on staff presence and allocation of tasks.\u003c/li\u003e\n\u003cli\u003eCreate, update and maintain special files (of confidential nature or for closer access for Director’s use) through an organised filing system and maintains a records system for tracking purposes.\u003c/li\u003e\n\u003cli\u003eEnsuring confidentiality of information and management records is guaranteed;\u003c/li\u003e\n\u003cli\u003ePrepare correspondences (outgoing memos and letters to internal and external recipients), executive summary, reports, briefing papers, power point presentations and other documents as required;\u003c/li\u003e\n\u003cli\u003eAssist the preparation, quality control and compilation of Finance and the Administration and Human Resources related documents.\u003c/li\u003e\n\u003cli\u003eMonitor meeting and correspondences outcomes and decisions and provide support in following up on their implementation; prepare update report for Director’s reference as need be.\u003c/li\u003e\n\u003cli\u003ePrepare and participate in various departmental meetings and prepare minutes and/or notes for review and endorsement by participants. Maintain files of minutes.\u003c/li\u003e\n\u003cli\u003eProvide communications support and assistance to ensure timely responses to inquiries, email and correspondences; assist the team of Secretaries whenever required. \u003c/li\u003e\n\u003cli\u003ePerform any other relevant duties and responsabilties as maybe assigned \u003c/li\u003e\n\u003c/ul\u003e\u003c/div\u003e\u003c/div\u003e\u003cdiv style=\"padding:10.0px 0.0px;border:1.0px solid transparent\"\u003e\u003cdiv style=\"font-size:18.0px;word-wrap:break-word\"\u003e\u003ch2 style=\"font-size:1.0em;margin:0.0px\"\u003e\u003cb\u003eAcademic Requirements and Relevant Experience\u003c/b\u003e\u003c/h2\u003e \u003c/div\u003e\u003cdiv\u003e\u003cul\u003e\n\u003cli\u003eDiploma in Business Management, Business Administration or any related field from a recognized educational institution with 3 years of relevant work experience in administrative and/or secretarial work.\u003c/li\u003e\n\u003cli\u003eCandidates who are holders of Bachelor’s degree in Business Management, Business Administration or any related field from a recognized educational institution are required to have 2 years of relevant work experience in administrative and/or secretarial work.\u003c/li\u003e\n\u003cli\u003eA higher qualification will be an added advantage\u003c/li\u003e\n\u003cli\u003eExperience in Office Management is mandatory.\u003c/li\u003e\n\u003cli\u003eExperience in planning and coordination of meetings with various stakeholders\u003c/li\u003e\n\u003cli\u003eWork experience in SAP is an added advantage \u003c/li\u003e\n\u003c/ul\u003e\u003c/div\u003e\u003c/div\u003e\u003cdiv style=\"padding:10.0px 0.0px;border:1.0px solid transparent\"\u003e\u003cdiv style=\"font-size:18.0px;word-wrap:break-word\"\u003e\u003ch2 style=\"font-size:1.0em;margin:0.0px\"\u003e\
